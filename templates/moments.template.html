<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, shrink-to-fit=no" />

        <!-- Page Title (SEO: 尽早声明) -->
        <title>{{PAGE_TITLE}}</title>

        <!-- SEO Meta Tags (由 build.js 从 config.pages.moments 生成) -->
        {{SEO_META}}

        <!-- Favicon -->
        {{FAVICON_LINKS}}

        <!-- 主题初始化脚本（必须在所有 CSS 之前执行，防止闪烁）-->
        {{THEME_INIT_SCRIPT}}

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.cn" />
        <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin />
        <link
            href="https://fonts.googleapis.cn/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <!-- Font Awesome Icons -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />

        <!-- Critical CSS: 默认隐藏元素 + Moments页面特定样式 -->
        <style>
            /* ========== 默认主题变量由 build.js 注入 ========== */
            :root {
                --navbar-height: 56px;
                --navbar-bg: transparent;
                --z-dropdown: 600;
                --radius-md: 12px;
                {{DEFAULT_THEME_VARS}}
            }

            /* ========== Reset & Base ========== */
            *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
            html { scroll-behavior: smooth; height: 100%; -webkit-text-size-adjust: 100%; }
            body {
                font-family: "Avenir Next", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
                background: var(--bg-primary);
                color: var(--text-primary);
                overflow-x: hidden;
                overflow-y: auto;
                min-height: 100%;
                position: relative;
            }

            /* ========== Navigation Bar ========== */
            .navbar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: var(--navbar-height);
                background: var(--navbar-bg);
                z-index: 1000;
                transition: background 0.3s ease;
            }
            .navbar.scrolled {
                background: var(--navbar-bg-scrolled);
                border-bottom: none;
                box-shadow: inset 0 -1px 0 0 var(--border);
            }
            .navbar-inner {
                max-width: 720px;
                margin: 0 auto;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 24px;
                gap: 24px;
            }
            .navbar-brand {
                display: flex;
                align-items: center;
                gap: 6px;
                text-decoration: none;
                color: var(--text-primary);
                font-size: 16px;
                font-weight: 500;
            }
            .navbar-brand .prompt, .navbar-brand .brand-name { color: var(--accent); }
            .navbar-menu { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; }
            .nav-link {
                position: relative;
                padding: 8px 16px;
                color: var(--text-secondary);
                text-decoration: none;
                font-size: 14px;
                font-weight: 500;
                transition: color 0.2s ease;
                white-space: nowrap;
            }
            .nav-link.active, .nav-link:hover { color: var(--accent); }
            .navbar-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
            .nav-theme-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 36px;
                height: 36px;
                background: none;
                border: none;
                border-radius: 8px;
                color: var(--text-secondary);
                cursor: pointer;
            }
            .nav-theme-toggle:hover { color: var(--accent); }
            .navbar-toggle { display: none; width: 36px; height: 36px; background: none; border: none; border-radius: 8px; color: var(--text-secondary); cursor: pointer; }

            /* ========== Theme & Mobile Dropdowns (强制隐藏，防止闪烁) ========== */
            .theme-dropdown,
            .nav-mobile-dropdown {
                position: fixed;
                top: calc(var(--navbar-height) + 8px);
                z-index: var(--z-dropdown);
                min-width: 180px;
                max-width: 280px;
                background: var(--bg-primary);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
                opacity: 0 !important;
                visibility: hidden !important;
                pointer-events: none !important;
                transform: translateY(-8px);
                transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
            }
            .theme-dropdown { right: 24px; }
            .nav-mobile-dropdown { right: 16px; }
            .theme-dropdown.is-active,
            .nav-mobile-dropdown.is-active {
                opacity: 1 !important;
                visibility: visible !important;
                pointer-events: auto !important;
                transform: translateY(0);
            }

            /* Theme dropdown inner styles */
            .theme-section { padding: 4px 0; }
            .theme-section-label {
                padding: 6px 12px 2px;
                font-size: 10px;
                font-weight: 600;
                color: var(--text-secondary);
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            .theme-mode-list { display: flex; flex-direction: column; }
            .theme-mode-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 6px 12px;
                background: none;
                border: none;
                color: var(--text-primary);
                cursor: pointer;
                font-size: 12px;
                text-align: left;
                width: 100%;
                transition: background 0.15s ease;
            }
            .theme-mode-item:hover { background: var(--hover-bg); }
            .theme-mode-item.is-active { color: var(--accent); background: var(--active-bg); }
            .theme-mode-item i {
                width: 20px;
                height: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 4px;
                background: var(--bg-secondary);
                font-size: 12px;
            }
            .theme-divider { height: 1px; background: var(--border); margin: 2px 0; }
            .theme-scheme-list { padding: 0; max-height: 200px; overflow-y: auto; }
            .theme-scheme-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 6px 12px;
                cursor: pointer;
                transition: background 0.15s ease;
                font-size: 12px;
            }
            .theme-scheme-item:hover { background: var(--hover-bg); }
            .theme-scheme-item.is-active { background: var(--active-bg); }
            .theme-scheme-item-icon {
                width: 20px;
                height: 20px;
                border-radius: 50%;
                background: var(--scheme-bg-primary, var(--bg-secondary));
                border: 1px solid var(--scheme-border, var(--border));
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            .theme-scheme-item-icon::after {
                content: '';
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: var(--scheme-accent, var(--accent));
            }

            /* ========== Responsive - Mobile ========== */
            @media (max-width: 768px) {
                .navbar-menu { display: none; }
                .nav-theme-toggle { display: flex; }
                .navbar-toggle { display: flex; }
                .navbar-inner { padding: 0 16px; gap: 8px; }
                .navbar-brand { font-size: 14px; }
            }
            @media (min-width: 769px) {
                .navbar-menu { display: flex; }
                .nav-theme-toggle { display: flex; }
                .navbar-toggle { display: none; }
            }

            /* Donation Modal */
            .donation__modal-overlay {
                position: fixed;
                inset: 0;
                z-index: 2000;
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }
            .donation__modal-overlay.is-active {
                opacity: 1;
                visibility: visible;
                pointer-events: auto;
            }

            /* Lightbox - 图片灯箱 */
            .moment-lightbox {
                position: fixed;
                inset: 0;
                z-index: 2000;
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }
            .moment-lightbox.is-active {
                opacity: 1;
                visibility: visible;
                pointer-events: auto;
            }

            /* ========== Moments 页面特定样式 ========== */
            .moments-wrapper {
                width: 100%;
                max-width: 600px;
            }

            /* 页面头部：东方优雅排版 */
            .moments-page-header {
                text-align: center;
                padding: var(--space-10) 0 var(--space-6);
            }

            /* 标题：统一字号 + 字重600 + 东方留白字间距 */
            .moments-page-header h1 {
                font-family: "JetBrains Mono", monospace;
                font-size: clamp(1.75rem, 5vw, 2.75rem);
                font-weight: 600;
                margin: 0;
                letter-spacing: 0.04em; /* 东方优雅：适度呼吸感 */
                background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            /* 标语：限定宽度 + 紧凑字间距 + 居中 */
            .moments-page-header p {
                color: var(--text-secondary);
                margin: var(--space-2) auto 0;
                font-size: 1rem;
                font-weight: 300;
                line-height: 1.6;
                letter-spacing: 0.02em;
                max-width: 340px;
            }

            /* ========== 分割线 ========== */
            .divider {
                width: 100%;
                height: 1px;
                background: linear-gradient(
                    90deg,
                    transparent 0%,
                    var(--divider-glow, var(--border)) 15%,
                    var(--divider-glow, var(--border)) 50%,
                    var(--divider-glow, var(--border)) 85%,
                    transparent 100%
                );
                margin: var(--space-6) 0;
            }

            .moments-section {
                text-align: left;
                padding: 0 0 var(--space-8);
                min-height: calc(100vh - 200px);
            }

            .moments-filter {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                justify-content: center;
                margin-bottom: var(--space-6);
                padding: 0 var(--space-4);
            }

            .moments-filter .filter-tag {
                padding: 6px 16px;
                border-radius: 20px;
                border: 1px solid var(--border);
                background: var(--bg-secondary);
                color: var(--text-secondary);
                font-size: 0.875rem; /* 14px */
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .moments-filter .filter-tag:hover {
                border-color: var(--accent);
                color: var(--accent);
            }

            .moments-filter .filter-tag.active {
                background: var(--accent);
                border-color: var(--accent);
                color: var(--bg-primary);
            }

            .moments-feed {
                display: flex;
                flex-direction: column;
                gap: var(--space-4);
            }

            .load-more-container {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 60px;
                margin-top: var(--space-6);
                padding-bottom: var(--space-8);
            }

            /* 无限滚动哨兵 */
            .infinite-scroll-sentinel {
                width: 100%;
                height: 1px;
            }

            /* 加载指示器 */
            .infinite-scroll-loader {
                display: flex;
                align-items: center;
                gap: 8px;
                color: var(--text-secondary);
                font-size: 0.875rem; /* 14px */
            }

            .infinite-scroll-loader .spinner {
                width: 16px;
                height: 16px;
                border: 2px solid var(--border);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

            @keyframes spin {
                to { transform: rotate(360deg); }
            }

            .load-more-btn {
                padding: 12px 32px;
                border-radius: 8px;
                border: 1px solid var(--border);
                background: var(--bg-secondary);
                color: var(--text-primary);
                font-size: 0.875rem; /* 14px */
                font-weight: 500;
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .load-more-btn:hover {
                border-color: var(--accent);
                color: var(--accent);
            }

            .load-more-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .footer {
                text-align: center;
            }

            @media (max-width: 768px) {
                .moments-page-header p {
                    font-size: 0.875rem;
                    max-width: 280px;
                }

                .moments-section {
                    padding: 0 0 var(--space-6);
                }

                .moments-filter {
                    margin-bottom: var(--space-4);
                }

                .moments-feed {
                    gap: var(--space-3);
                }
            }
        </style>

        <!-- Main Stylesheet -->
        <link rel="preload" href="../style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
        <noscript><link rel="stylesheet" href="../style.css"></noscript>

        <!-- JS Files -->
        <!-- MediaManager 必须在其他脚本之前加载 -->
        <script src="../media-manager.js" defer></script>
        <script src="../config.js" defer></script>
        <script src="../theme-utils.js" defer></script>
    </head>
    <body>
        {{> navbar}}

        <div class="container">
            <div class="moments-wrapper">
                <!-- 页面标题 -->
                <div class="moments-page-header">
                    <h1>{{PAGE_TITLE_TEXT}}</h1>
                    <p>{{PAGE_TAGLINE}}</p>
                </div>

                <!-- 分割线 -->
                <div class="divider"></div>

                <!-- 动态内容区域 -->
                <section class="moments-section">
                    <!-- 标签筛选器（预置骨架屏） -->
                    <div class="moments-filter" role="tablist">
                        <div class="skeleton-filter-tag skeleton"></div>
                        <div class="skeleton-filter-tag skeleton"></div>
                        <div class="skeleton-filter-tag skeleton"></div>
                    </div>

                    <!-- 动态列表 -->
                    <div id="moments-feed" class="moments-feed"></div>

                    <!-- 无限滚动容器 -->
                    <div class="load-more-container"></div>
                </section>

                {{> footer}}
            </div>
        </div>

        <!-- Moments Module -->
        <script src="../moments.js" defer></script>
        <!-- Main Application -->
        <script src="../app.js" defer></script>
    </body>
</html>
