<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, shrink-to-fit=no" />

        <!-- Favicon -->
        {{FAVICON_LINKS}}

        <!-- SEO Meta Tags -->
        <meta name="description" content="页面未找到 - {{NAME}}" />
        <meta name="robots" content="noindex, nofollow" />

        <!-- Page Title -->
        <title>404 - 页面未找到 | {{NAME}}</title>

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.cn" />
        <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin />
        <link
            href="https://fonts.googleapis.cn/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <!-- Font Awesome Icons -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />

        {{THEME_INITIAL}}

        <!-- Critical CSS: 404页面特定样式 -->
        <style>
            .error-content {
                text-align: center;
                max-width: 480px;
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .error-code {
                font-family: "JetBrains Mono", "SF Mono", "Cascadia Code", Menlo, Monaco, Consolas, monospace;
                font-size: clamp(5rem, 18vw, 10rem);
                font-weight: 700;
                line-height: 1;
                background: linear-gradient(135deg, var(--accent) 0%, var(--text-secondary) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin-bottom: 12px;
                user-select: none;
            }

            .error-title {
                font-size: clamp(1.1rem, 2.5vw, 1.5rem);
                font-weight: 600;
                color: var(--text-primary);
                margin-bottom: 8px;
            }

            .error-message {
                font-size: clamp(0.85rem, 1.8vw, 0.95rem);
                color: var(--text-secondary);
                margin-bottom: 24px;
                max-width: 360px;
            }

            .error-actions {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .btn-home {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 10px 20px;
                background: var(--accent);
                color: var(--bg-primary);
                text-decoration: none;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 500;
                transition: transform 0.2s ease, box-shadow 0.2s ease;
            }

            .btn-home:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(var(--accent-rgb), 0.3);
            }

            .btn-back {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 10px 20px;
                background: transparent;
                color: var(--text-primary);
                text-decoration: none;
                border: 1px solid var(--border);
                border-radius: 8px;
                font-size: 14px;
                font-weight: 500;
                transition: border-color 0.2s ease, color 0.2s ease;
                cursor: pointer;
            }

            .btn-back:hover {
                border-color: var(--accent);
                color: var(--accent);
            }

            @media (max-width: 768px) {
                .error-actions { flex-direction: column; width: 100%; max-width: 240px; }
                .btn-home, .btn-back { width: 100%; justify-content: center; }
            }
        </style>

        <!-- Main Stylesheet: 复用首页样式 -->
        <link rel="preload" href="style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
        <noscript><link rel="stylesheet" href="style.css"></noscript>

        <!-- JS Files: 复用首页脚本 -->
        <script src="config.js" defer></script>
        <script src="theme-utils.js" defer></script>
    </head>
    <body>
        {{> navbar}}

        <!-- 404 Content -->
        <div class="container">
            <div class="error-content">
                <div class="error-code">404</div>
                <h1 class="error-title">页面走丢了</h1>
                <p class="error-message">抱歉，您访问的页面不存在或已被删除。</p>
                <div class="error-actions">
                    <a href="/" class="btn-home">
                        <i class="fa-solid fa-home"></i>
                        返回首页
                    </a>
                    <button class="btn-back" id="btn-back">
                        <i class="fa-solid fa-arrow-left"></i>
                        返回上页
                    </button>
                </div>
            </div>

            {{> footer}}
        </div>

        <!-- Main Application Script: 复用首页脚本 -->
        <script src="app.js" defer></script>

        <!-- 404页面特定脚本 -->
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                // 返回上一页
                var btnBack = document.getElementById('btn-back');
                if (btnBack) {
                    btnBack.addEventListener('click', function() {
                        if (window.history.length > 1) {
                            window.history.back();
                        } else {
                            window.location.href = '/';
                        }
                    });
                }
            });
        </script>
    </body>
</html>
